# Vision GridAI Dashboard — Nginx Config (source of truth)
# Live copy at /opt/nginx-conf/dashboard.conf on the VPS.
# Bearer redacted as __DASHBOARD_API_TOKEN__; real value only in the live file.
# Deployment: nginx:alpine container behind Traefik (Traefik terminates TLS).

server {
    listen 80;
    server_name dashboard.operscale.cloud;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Security headers ───────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://supabase.operscale.cloud; img-src 'self' https: data: blob:; media-src 'self' https: blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Generic error responder for /webhook/* — swallows upstream 5xx bodies
    # that could leak n8n node names / stack traces, replaces with a
    # stable {success:false, error:"Internal error", request_id:<uuid>}
    # shape (audit L-2). `request_id` is nginx's built-in $request_id so
    # the operator can correlate the opaque client error with logs.
    location @webhook_internal_error {
        default_type application/json;
        return 500 '{"success":false,"data":null,"error":"Internal error","request_id":"$request_id","http_status":500}';
    }

    location /webhook/ {
        # ─── CSRF-style Origin lockdown (Batch 4 follow-up) ─────────────
        set $csrf_allow 0;
        if ($request_method = OPTIONS)                           { set $csrf_allow 1; }
        if ($http_origin = "")                                   { set $csrf_allow 1; }
        if ($http_origin = "https://dashboard.operscale.cloud")  { set $csrf_allow 1; }
        if ($csrf_allow = 0) {
            return 403;
        }

        # ─── CORS: strict allowlist, no upstream reflection ─────────────
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;

        if ($http_origin = "https://dashboard.operscale.cloud") {
            add_header Access-Control-Allow-Origin "https://dashboard.operscale.cloud" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Access-Control-Max-Age "300" always;
            add_header Vary "Origin" always;
        }

        if ($request_method = OPTIONS) {
            return 204;
        }

        # ─── Generic error-shape guarantee (audit L-2) ──────────────────
        # If n8n or its upstream returns a 5xx, intercept the response
        # and rewrite with a clean JSON envelope. 4xx responses from n8n
        # come from our Validate nodes and Respond To Webhook nodes that
        # we control, so pass them through untouched.
        proxy_intercept_errors on;
        error_page 500 502 503 504 = @webhook_internal_error;

        proxy_pass http://n8n:5678/webhook/;
        proxy_set_header Host n8n.srv1297445.hstgr.cloud;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Authorization "Bearer __DASHBOARD_API_TOKEN__";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
