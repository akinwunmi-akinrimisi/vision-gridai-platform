# Vision GridAI Dashboard — Nginx Config (source of truth)
# Live copy at /opt/nginx-conf/dashboard.conf on the VPS.
# The Bearer token below is redacted (__DASHBOARD_API_TOKEN__); the live file
# contains the real value. If you rotate the token, edit both.
# Deployment: nginx:alpine container behind Traefik (Traefik terminates TLS).

server {
    listen 80;
    server_name dashboard.operscale.cloud;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Security headers ───────────────────────────────────────────────
    # Added 2026-04-21 per audit H-3 (docs/SECURITY_AUDIT_2026_04_21.md).
    # "always" ensures the header is emitted on 4xx/5xx too — important for
    # preflights and error leaks.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://supabase.operscale.cloud; img-src 'self' https: data: blob:; media-src 'self' https: blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /webhook/ {
        # ─── CORS: strict allowlist, not upstream reflection ─────────────
        # n8n emits `Access-Control-Allow-Origin: <echoed request origin>`
        # which lets any malicious site mount in-browser attacks against a
        # logged-in dashboard session. Strip n8n's CORS headers and inject
        # a single-origin allowlist.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;

        if ($http_origin = "https://dashboard.operscale.cloud") {
            add_header Access-Control-Allow-Origin "https://dashboard.operscale.cloud" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Access-Control-Max-Age "300" always;
            add_header Vary "Origin" always;
        }

        # CORS preflight — short-circuit without hitting n8n.
        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://n8n:5678/webhook/;
        proxy_set_header Host n8n.srv1297445.hstgr.cloud;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Authorization "Bearer __DASHBOARD_API_TOKEN__";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
