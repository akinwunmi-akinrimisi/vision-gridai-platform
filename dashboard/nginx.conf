# Vision GridAI Dashboard — Nginx Config
# Deployment: Docker container (nginx:alpine) behind Traefik reverse proxy
# SSL/TLS: handled by Traefik (TLS challenge) — this config is HTTP only internally
# Container listens on port 80; Traefik terminates HTTPS on 443 and proxies to this container

server {
    listen 80;
    server_name dashboard.operscale.cloud;

    # React SPA
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — all non-file requests go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy n8n webhooks
    location /webhook/ {
        proxy_pass https://n8n.srv1297445.hstgr.cloud/webhook/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy Supabase (for Realtime WebSocket)
    location /supabase/ {
        proxy_pass https://supabase.operscale.cloud/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
