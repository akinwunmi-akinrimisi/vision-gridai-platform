# Dashboard Docker Compose Service — to be merged into /docker/n8n/docker-compose.override.yml
#
# Deployment model: nginx:alpine container behind Traefik
# Traefik handles SSL/TLS via Let's Encrypt TLS challenge (same as n8n)
# Static files served from /opt/dashboard on the VPS (bind mount)
#
# Prerequisites:
#   1. DNS A record: dashboard.operscale.cloud → 72.61.201.148 (VPS IP)
#   2. React build deployed to /opt/dashboard on VPS (see deploy steps below)
#   3. Nginx config written to /etc/nginx/conf.d/dashboard.conf on VPS
#      (or use the inline config via command override)
#
# Deploy steps (run on VPS at /docker/n8n/):
#   scp -r dashboard/dist/* root@srv1297445.hstgr.cloud:/opt/dashboard/
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up -d dashboard

services:
  dashboard:
    image: nginx:alpine
    container_name: dashboard
    restart: always
    volumes:
      - /opt/dashboard:/usr/share/nginx/html:ro
      - /opt/nginx-conf/dashboard.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.dashboard.rule=Host(`dashboard.operscale.cloud`)
      - traefik.http.routers.dashboard.tls=true
      - traefik.http.routers.dashboard.entrypoints=web,websecure
      - traefik.http.routers.dashboard.tls.certresolver=mytlschallenge
      - traefik.http.middlewares.dashboard.headers.SSLRedirect=true
      - traefik.http.middlewares.dashboard.headers.STSSeconds=315360000
      - traefik.http.middlewares.dashboard.headers.forceSTSHeader=true
      - traefik.http.routers.dashboard.middlewares=dashboard@docker
    networks:
      - n8n_network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
