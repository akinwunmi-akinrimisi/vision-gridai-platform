# ================================================================
# Docker Compose Override for Vision GridAI
# ================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
#
# Adjust memory limits based on your VPS RAM.
# These values assume a 4GB+ VPS. Scale proportionally.
#
# Total memory allocated: ~3.3GB (leaves headroom for OS + Nginx)
#   n8n:              1536M (workflow execution, Node.js heap)
#   supabase-db:      1024M (PostgreSQL, connections, query cache)
#   supabase-realtime:  512M (WebSocket connections from dashboard)
#   supabase-rest:      256M (PostgREST API layer)
# ================================================================

version: "3.8"

services:
  # n8n container -- needs memory for Node.js + workflow execution
  # Long-running workflows (script gen, niche research) need generous timeouts
  n8n:
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M
    environment:
      - EXECUTIONS_TIMEOUT=600
      - EXECUTIONS_TIMEOUT_MAX=900
      - N8N_EXECUTIONS_PROCESS_TIMEOUT=600
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - NODE_OPTIONS=--max-old-space-size=1024

  # Supabase PostgreSQL -- needs memory for connections + query cache
  # Command-line flags override postgresql.conf without editing the file
  supabase-db:
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c work_mem=8MB
      -c effective_cache_size=512MB
      -c statement_timeout=30s
      -c idle_in_transaction_session_timeout=300s

  # Supabase Realtime -- WebSocket connections from dashboard
  # Each dashboard tab holds 2-3 subscriptions (scenes, topics, projects)
  supabase-realtime:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # Supabase PostgREST -- REST API layer
  # Lightweight: just translates HTTP to SQL
  supabase-rest:
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
