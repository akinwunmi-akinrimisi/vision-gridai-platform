name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npx vitest run --reporter=verbose
      - run: npm audit --audit-level=high

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build

  lint-workflows:
    # Catches the silent-failure auth-gap class fixed in 5fc2cd1 + b38a94b.
    # See tools/lint_n8n_workflows.py — AUTH-WRITE-01 / AUTH-READ-01 etc.
    # Runs against repo workflow JSON (no live n8n SSH access needed in CI).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Lint n8n workflow JSON
        run: |
          shopt -s nullglob
          files=(workflows/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No workflows/ JSON files found; nothing to lint."
            exit 0
          fi
          python tools/lint_n8n_workflows.py --files "${files[@]}"
